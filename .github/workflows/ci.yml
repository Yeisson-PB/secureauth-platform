# ─────────────────────────────────────────────────────────────────────────────
# Main CI Pipeline
# Triggers on every push and pull request to main/develop.
# Jobs: lint → (security + test in parallel) → build
# ─────────────────────────────────────────────────────────────────────────────
name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/secureauth_test
  REDIS_URL: redis://localhost:6379/0
  SECRET_KEY: ci-test-secret-key-not-for-production
  APP_ENV: test

jobs:
  # ── Job 1: Lint ─────────────────────────────────────────────────────────────
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install UV
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --dev

      - name: Check formatting with Black
        run: uv run black --check app/ tests/

      - name: Check import ordering with isort
        run: uv run isort --check-only app/ tests/

      - name: Lint with Flake8
        run: uv run flake8 app/ tests/ --max-line-length=88 --extend-ignore=E203,W503

  # ── Job 2: Security SAST ────────────────────────────────────────────────────
  security:
    name: Security Scan (SAST)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install UV
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --dev

      - name: Run Bandit (Python security linter)
        run: |
          uv run bandit -c pyproject.toml -r app/ \
            -f json \
            -o bandit-results.json \
            --exit-zero
          echo "Bandit scan complete. Results saved to bandit-results.json"
          # Print summary to logs
          uv run bandit -c pyproject.toml -r app/ --exit-zero

      - name: Upload Bandit results as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-security-report
          path: bandit-results.json
          retention-days: 30

      - name: Run Semgrep (OWASP Top 10 rules)
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/python
            p/owasp-top-ten
            p/secrets
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

  # ── Job 3: Tests ─────────────────────────────────────────────────────────────
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: secureauth_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install UV
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Cache UV dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Install dependencies
        run: uv sync --dev

      - name: Run Pytest with coverage
        run: |
          uv run pytest tests/ \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=0 \
            -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # ── Job 4: Docker Build ──────────────────────────────────────────────────────
  build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [lint, test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          dockerfile: Dockerfile
          target: runtime
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: secureauth-platform:ci-${{ github.sha }}
