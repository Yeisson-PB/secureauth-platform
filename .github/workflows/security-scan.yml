# ─────────────────────────────────────────────────────────────────────────────
# Weekly Dependency Security Scan
# Checks all installed packages against known CVE databases.
# Runs every Sunday at 02:00 UTC and can be triggered manually.
# ─────────────────────────────────────────────────────────────────────────────
name: Dependency Security Scan

on:
  schedule:
    # Every Sunday at 02:00 UTC
    # Format: minute hour day-of-month month day-of-week
    - cron: "0 2 * * 0"
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  dependency-audit:
    name: Audit Dependencies for CVEs
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      issues: write  # Allows creating issues if vulnerabilities are found

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install UV
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.4.20"

      - name: Set up Python
        run: uv python install "3.11"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Export requirements for audit
        # pip-audit works with requirements.txt format
        run: uv export --frozen --no-hashes -o requirements-audit.txt

      - name: Run pip-audit (CVE scanner)
        # pip-audit checks each installed package against:
        # - PyPI Advisory Database
        # - OSV (Open Source Vulnerabilities)
        # - GitHub Advisory Database
        run: |
          uv run pip-audit \
            -r requirements-audit.txt \
            --format json \
            --output pip-audit-results.json \
            --ignore-vuln GHSA-placeholder || true
          # '|| true' prevents the step from failing immediately;
          # we want to see the report even if vulnerabilities exist.

      - name: Display audit results
        if: always()
        run: |
          if [ -f pip-audit-results.json ]; then
            echo "=== Dependency Audit Results ==="
            cat pip-audit-results.json | python3 -m json.tool
          fi

      - name: Create GitHub issue if vulnerabilities found
        # If pip-audit found vulnerabilities (exit code != 0), create an issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '## 🚨 Security Vulnerabilities Found\n\n';
            body += 'The weekly dependency scan found vulnerabilities.\n\n';
            body += '**Run locally:** `uv run pip-audit -r requirements-audit.txt`\n\n';
            body += `**Workflow run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔒 Security: Vulnerable dependencies detected (${new Date().toISOString().split('T')[0]})`,
              body: body,
              labels: ['security', 'dependencies']
            });
